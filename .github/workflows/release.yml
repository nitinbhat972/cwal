name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------
      # Generate full CHANGELOG.md
      # ----------------------------
      - name: Generate CHANGELOG.md
        id: cliff_full
        uses: orhun/git-cliff-action@v4
        with:
          args: -o CHANGELOG.md

      # ----------------------------
      # Commit updated changelog
      # ----------------------------
      - name: Commit updated changelog
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add CHANGELOG.md
          git commit -m "chore: update changelog for ${{ github.ref_name }}" || echo "No changes"
          git push origin HEAD:main

      # ----------------------------
      # Generate release notes for latest tag
      # ----------------------------
      - name: Generate Release Notes
        id: cliff_latest
        uses: orhun/git-cliff-action@v4
        with:
          args: --latest --strip header

      # ----------------------------
      # Get previous tag for compare link
      # ----------------------------
      - name: Get previous tag
        id: prev
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 --exclude="${{ github.ref_name }}" 2>/dev/null || echo "")
          echo "tag=$PREV_TAG" >> $GITHUB_OUTPUT

      # ----------------------------
      # Create GitHub Release
      # ----------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ${{ steps.cliff_latest.outputs.content }}

            ---
            ${{ steps.prev.outputs.tag != '' && format('**Full Changelog:** https://github.com/{0}/compare/{1}...{2}', github.repository, steps.prev.outputs.tag, github.ref_name) || '**Full Changelog:** Initial release' }}
