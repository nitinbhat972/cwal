name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        required: true
        type: string

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Validate release input
        id: meta
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ ! "$INPUT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid tag: $INPUT_TAG"
            echo "Expected format: vX.Y.Z"
            exit 1
          fi

          echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          echo "version=${INPUT_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Update VERSION
        run: printf '%s\n' "${{ steps.meta.outputs.version }}" > VERSION

      - name: Commit VERSION and push tag
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
          RELEASE_VERSION: ${{ steps.meta.outputs.version }}
          RELEASE_BRANCH: ${{ github.ref_name }}
        run: |
          git fetch --tags origin

          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $RELEASE_TAG"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet -- VERSION; then
            git add VERSION
            git commit -m "chore(release): update version ${RELEASE_TAG}"
            git push origin "HEAD:${RELEASE_BRANCH}"
          fi

          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

  release:
    name: Create GitHub Release
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.tag }}

      - name: Generate Release Notes
        id: cliff_current
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/release/release.toml
          args: --current --strip header
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          name: ${{ needs.prepare-release.outputs.tag }}
          body: ${{ steps.cliff_current.outputs.content }}

